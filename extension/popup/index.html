<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoCrab Extension</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 500px;
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #ffffff;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2d3a;
    }
    .header h1 { font-size: 18px; color: #4f9cf9; margin-bottom: 4px; }
    .header p { font-size: 11px; color: #555; }
    .screen { display: none; }
    .screen.active { display: block; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
    input {
      width: 100%; padding: 10px 12px;
      background: #1a1d2e;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #ffffff; font-size: 14px; outline: none;
    }
    input:focus { border-color: #4f9cf9; }
    .btn {
      width: 100%; padding: 11px;
      background: #4f9cf9; border: none;
      border-radius: 8px; color: #fff;
      font-size: 14px; font-weight: bold;
      cursor: pointer; margin-top: 6px;
    }
    .btn:hover { background: #3d8be8; }
    .btn.secondary {
      background: #1a1d2e;
      border: 1px solid #2a2d3a;
      color: #888; margin-top: 8px;
    }
    .btn.danger {
      background: #3a1a1a;
      border: 1px solid #f44336;
      color: #f44336; margin-top: 8px;
    }
    .message { font-size: 12px; margin-top: 8px; text-align: center; }
    .message.error { color: #f44336; }
    .message.success { color: #4caf50; }
    .status-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; padding: 10px 14px;
      background: #1a1d2e; border-radius: 8px;
      border: 1px solid #2a2d3a;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    .dot.yellow { background: #ffc107; box-shadow: 0 0 6px #ffc107; }
    .dot.red { background: #f44336; }
    .status-text { font-size: 12px; color: #888; }
    .status-text span { color: #fff; font-weight: 500; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3a; border-radius: 8px; padding: 12px; }
    .card-label { font-size: 10px; color: #555; margin-bottom: 4px; text-transform: uppercase; }
    .card-value { font-size: 18px; font-weight: bold; color: #4f9cf9; }
    .card-value.green { color: #4caf50; }
    .card-value.red { color: #f44336; }
    .card-value.white { color: #fff; }
    .card-value.small { font-size: 13px; }
    .user-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; background: #1a1d2e;
      border-radius: 8px; border: 1px solid #2a2d3a;
      margin-bottom: 14px;
    }
    .user-name { font-size: 12px; color: #4f9cf9; font-weight: 500; }
    .logout-btn {
      font-size: 11px; color: #666; background: none;
      border: none; cursor: pointer; padding: 2px 6px;
    }
    .logout-btn:hover { color: #f44336; }
    .switch-link {
      text-align: center; margin-top: 12px;
      font-size: 12px; color: #555;
    }
    .switch-link span { color: #4f9cf9; cursor: pointer; }
    .switch-link span:hover { text-decoration: underline; }
    .loading { text-align: center; color: #555; font-size: 13px; padding: 30px 0; }
  </style>
</head>
<body>

<div class="header">
  <h1>AlgoCrab</h1>
  <p>945 Straddle Strategy Engine</p>
</div>

<!-- SCREEN 1: LOGIN -->
<div class="screen active" id="screen-login">
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Your password">
  </div>
  <button class="btn" id="loginBtn">Login</button>
  <div class="message error" id="loginMessage"></div>
  <div class="switch-link">
    Don't have an account? <span id="goToRegister">Register here</span>
  </div>
</div>

<!-- SCREEN 2: REGISTER -->
<div class="screen" id="screen-register">
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your full name">
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Create a password">
  </div>
  <button class="btn" id="registerBtn">Create Account</button>
  <div class="message error" id="registerMessage"></div>
  <div class="switch-link">
    Already have an account? <span id="goToLogin">Login here</span>
  </div>
</div>

<!-- SCREEN: CONNECT ANGEL ONE -->
<div class="screen" id="screen-connect-angelone">
  <div class="form-group">
    <label>Angel One Client ID</label>
    <input type="text" id="angelClientId" placeholder="e.g. J60905466">
  </div>
  <div class="form-group">
    <label>Angel One Password</label>
    <input type="password" id="angelPassword" placeholder="Your Angel One password">
  </div>
  <div class="form-group">
    <label>TOTP Secret Key</label>
    <input type="text" id="angelTotpSecret" placeholder="From Enable TOTP page">
  </div>
  <button class="btn" id="connectAngelBtn">Connect Angel One</button>
  <div class="message error" id="connectAngelMessage"></div>
  <div class="switch-link">
    <span id="skipAngelConnect">Skip for now</span>
  </div>
</div>

<!-- SCREEN 3: DASHBOARD -->
<div class="screen" id="screen-dashboard">
  <div class="user-bar">
    <span class="user-name" id="userName">Welcome</span>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div id="dashContent">
    <div class="loading">Loading live data...</div>
  </div>

<button class="btn" id="demoBtn" style="background:#4caf50;margin-top:10px">▶ Trigger Demo Trade Now</button>
<button class="btn secondary" id="refreshBtn">↻ Refresh</button>
<button class="btn danger" id="resetBtn">Reset Strategy Settings</button>
</div>

<script src="script.js"></script>
</body>
</html>
